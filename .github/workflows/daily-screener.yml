name: Daily Stock Screener

on:
  schedule:
    # 每週一到五 21:30 UTC = 美東時間 17:30（收盤後 1.5 小時）
    # = 台灣時間隔日 05:30
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # 允許手動觸發

jobs:
  run-screener:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允許 push docs/ 回 repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PYTHONUTF8: '1'
        # --dry-run: 只生成 HTML，不在 Python 內做 git push
        # --yes: 跳過重複執行確認（CI 環境無法互動）
        run: python main.py --dry-run --yes

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "report: $(date -u +%Y-%m-%d)" && git push
